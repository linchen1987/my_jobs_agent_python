name: Daily Job Agent

on:
  workflow_dispatch:

  schedule:
    - cron: '0 1 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Set up uv
        uses: astral-sh/setup-uv@v1

      - name: Run Script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_API_ENDPOINT: ${{ secrets.OPENAI_API_ENDPOINT }}
          OPENAI_MODEL_ID: ${{ secrets.OPENAI_MODEL_ID }}
          STORAGE_TYPE: ${{ secrets.STORAGE_TYPE }}
          STORAGE_ROOT_PATH: ${{ secrets.STORAGE_ROOT_PATH }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_REGION: ${{ secrets.S3_REGION }}
          TELEGRAM_ENABLED: ${{ secrets.TELEGRAM_ENABLED }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python -m jobs_agent

      - name: Keepalive Workflow
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          last_commit_date=$(git log -1 --format=%ct)
          current_date=$(date +%s)
          days_diff=$(( (current_date - last_commit_date) / 86400 ))

          echo "Days since last commit: $days_diff"

          if [ $days_diff -gt 50 ]; then
            echo "Pushing empty commit to keep workflow active..."
            git commit --allow-empty -m "Keepalive workflow [skip ci]"
            git push
          else
            echo "Repository is active. No action needed."
          fi
